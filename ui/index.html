<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jig</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/v3.css">
</head>
<body>
  <div id="app">

    <aside id="sidebar">
      <div class="brand">
        <span class="brand-name">Jig</span>
      </div>
      <nav id="main-nav">
        <a class="nav-item active" data-view="dashboard">
          <span class="nav-icon">&#9632;</span> Dashboard
        </a>
        <a class="nav-item" data-view="flows">
          <span class="nav-icon">&#9632;</span> Flows
        </a>
        <a class="nav-item" data-view="blocks">
          <span class="nav-icon">&#9632;</span> Blocks
        </a>
        <a class="nav-item" data-view="profiles">
          <span class="nav-icon">&#9632;</span> Profiles
        </a>
        <a class="nav-item" data-view="bookings">
          <span class="nav-icon">&#9632;</span> Bookings
        </a>
        <a class="nav-item" data-view="schedules">
          <span class="nav-icon">&#9632;</span> Schedules
        </a>
        <a class="nav-item" data-view="trial">
          <span class="nav-icon">&#9632;</span> Trial Run
        </a>
        <a class="nav-item" data-view="settings">
          <span class="nav-icon">&#9632;</span> Settings
        </a>
        <a class="nav-item" data-view="planner">
          <span class="nav-icon">&#9632;</span> Planner
        </a>
      </nav>
    </aside>

    <main id="main-content">
      <div class="loading">Loading...</div>
    </main>

  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
      <button id="modal-close" class="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Mermaid — loaded async; TreeView degrades gracefully if offline -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" async></script>

  <script src="js/api.js"></script>

  <!-- V3 components (must load before views that depend on them) -->
  <script src="js/components/step_card.js"></script>
  <script src="js/components/right_panel.js"></script>
  <script src="js/components/command_palette.js"></script>
  <script src="js/views/live_run.js"></script>
  <script src="js/views/tree_view.js"></script>
  <script src="js/views/workspace.js"></script>
  <script src="js/views/flows.js"></script>
  <script src="js/views/block_library.js"></script>
  <script src="js/views/block_constructor.js"></script>
  <script src="js/views/planner.js"></script>

  <!-- V2 views -->
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/profiles.js"></script>
  <script src="js/views/bookings.js"></script>
  <script src="js/views/schedules.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/views/trial.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
